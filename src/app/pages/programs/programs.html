<div class="programs ">
    <div class="p-3">
        <div class="header d-flex justify-content-between align-items-center ">
            <div>
                <h4 class="mb-0">Programs</h4>
                <p>Manage, upload and schedule broadcast programs.</p>
            </div>

            <app-primary-button label="Add new program" iconSrc="/main/add.svg"
                (clicked)="openModal()"></app-primary-button>
        </div>

        <div class="divider"></div>

        <div class="d-flex justify-content-between align-items-center">
            <div class="filter-container">
                <mat-form-field appearance="outline" class="search-field">
                    <span matPrefix class="search-icon">
                        <img src="/main/searchIcon.svg" alt="search" />
                    </span>
                    <input matInput placeholder="Search here..." [(ngModel)]="searchText" />
                </mat-form-field>

                <app-select-drop-down placeholder="All Status" [(value)]="status" [options]="[
    { label: 'All Status', value: 'all' },
    { label: 'Active', value: 'active' },
    { label: 'Upcoming', value: 'upcoming' },
    { label: 'Completed', value: 'completed' }
  ]">
                </app-select-drop-down>

                <app-select-drop-down placeholder="All Category" [(value)]="category" [options]="[
    { label: 'All Category', value: 'all' },
    { label: 'Pre-Scheduled', value: 'pre_scheduled' },
    { label: 'Podcast', value: 'podcast' },
    { label: 'Live', value: 'live' }
  ]">
                </app-select-drop-down>

                <app-select-drop-down placeholder="All host" [(value)]="host" [options]="[
                 { label: 'All host', value: 'all' },
    { label: 'RJ Anjali', value: 'anjali' },
    { label: 'RJ Neena', value: 'neena' },
    { label: 'RJ Priyanka', value: 'priyanka' },
    { label: 'RJ Reeva', value: 'reeva' }
  ]">
                </app-select-drop-down>



                <app-select-drop-down placeholder="All Programs" [(value)]="program" [options]="[
                 { label: 'All Programs', value: 'all' },
    { label: 'Today', value: 'today' },
    { label: 'Tomorrow', value: 'tomorrow' },
    { label: 'Custom date', value: 'date' },
  ]">
                </app-select-drop-down>
            </div>
            <div class="d-flex align-items-center gap-1">
                <p style="font-size: 12px; font-weight: 500; color: #757575;">Clear filters</p>
                <mat-icon style="font-size: 12px; color: #757575; cursor: pointer;" class="mb-1">cancel</mat-icon>
            </div>
        </div>

    </div>

    <table mat-table [dataSource]="dataSource" class="custom-table">

        <ng-container matColumnDef="program">
            <th mat-header-cell *matHeaderCellDef>Program Title</th>
            <td mat-cell *matCellDef="let row">
                <div class="program-cell">
                    <img [src]="row.avatar" class="avatar" />
                    <div class="program-name">{{ row.name }}</div>
                </div>
            </td>
        </ng-container>

        <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef>Category</th>
            <td mat-cell *matCellDef="let row">
                <span class="category" [ngClass]="row.categoryClass">
                    {{ row.category }}
                </span>
            </td>
        </ng-container>

        <ng-container matColumnDef="host">
            <th mat-header-cell *matHeaderCellDef>Host</th>
            <td mat-cell *matCellDef="let row">
                <div class="user">{{ row.host }}</div>
            </td>
        </ng-container>

        <ng-container matColumnDef="duration">
            <th mat-header-cell *matHeaderCellDef>Duration</th>
            <td mat-cell *matCellDef="let row">
                {{ row.duration }}
            </td>
        </ng-container>

        <ng-container matColumnDef="dayTime">
            <th mat-header-cell *matHeaderCellDef>Schedule Day → Time</th>
            <td mat-cell *matCellDef="let row">
                {{ row.dayTime }}
            </td>
        </ng-container>

        <ng-container matColumnDef="interaction">
            <th mat-header-cell *matHeaderCellDef>Listener Interaction</th>
            <td mat-cell *matCellDef="let row">
                <span class="interaction" [ngClass]="row.interactionClass">

                    <mat-icon *ngIf="row.interactionClass === 'allow'">check_circle</mat-icon>

                    <mat-icon *ngIf="row.interactionClass === 'disabled'">info</mat-icon>

                    {{ row.interaction }}
                </span>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>

    </table>

    <mat-paginator [length]="22" [pageSize]="7" [pageSizeOptions]="[7]" showFirstLastButtons>
    </mat-paginator>

</div>
