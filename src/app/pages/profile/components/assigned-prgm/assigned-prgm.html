<div class="row">

  <!-- LEFT SIDE -->
  <div class="col-md-3">
    <div class="d-flex flex-column justify-content-start">
      <p class="mainHead mb-1">Assigned Programs</p>
      <small class="subHeading">
        Shows you host and manage on the station.
      </small>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="col-md-9">

    @if (assignedPrograms?.length > 0) {

      <div class="row">

        @for (program of assignedPrograms; track program) {

          <div class="col-md-4 mb-3">

            <div class="d-flex gap-3">
              
              <img 
                src="/profile/mike-fallback.jpg" 
                alt="profile" 
                class="rounded" 
                width="80" 
                height="80"
                style="object-fit: cover;" 
              />

              <div class="d-flex flex-column gap-1">

                <!-- Status -->
                <span class="active-btn">
                  ● {{ program.CategoryName || 'Active' }}
                </span>

                <!-- Title -->
                <span class="radio-btn">
                  {{ program.Title }}
                </span>

                <!-- Timing -->
                <span class="timing">
                  {{ program.DayRange }} • {{ program.TimeRange }}
                </span>

              </div>

            </div>

          </div>

        }

      </div>

    } @else {

      <p class="text-muted no-program-txt px-2">No programs assigned</p>

    }

  </div>

</div>

<mat-divider class="text-secondary bg-muted my-4"></mat-divider>
