<div class="bg-container d-flex flex-column">
  <div class="d-flex justify-content-center align-items-center h-100">
    <div class="login-card d-flex">

      <div class="logo d-flex align-items-center justify-content-center">
        <img src="/auth/Frame.png" alt="">
      </div>

      <div class="signin-form d-flex align-items-center justify-content-center">
        <div>

          <div class="d-flex justify-content-center pt-2">
            <img src="/auth/mike.svg" alt="">
          </div>

          <div class="text-center pt-3 mb-5">
            <p class="welcome-head">Welcome Back!</p>
            <p class="welcome-text">Login in to your dashboard</p>
          </div>

          <div class="form-container">

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
              <div class="form-group">
                <label>Email Address</label>
                <input
                  type="email"
                  placeholder="e.g. smithjohn45@gmail.com"
                  class="form-input"
                  formControlName="email"
                />

                <small class="error"
                  *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.touched || submitted)">

                  <span *ngIf="loginForm.get('email')?.errors?.['required']">
                    Email is required
                  </span>

                  <span *ngIf="loginForm.get('email')?.errors?.['email']">
                    Invalid email format
                  </span>
                </small>
              </div>

              <div class="form-group password-wrapper">
                <label>Password</label>

                <div class="input-with-icon">
                  <input
                    [type]="hide ? 'password' : 'text'"
                    placeholder="Enter your password"
                    class="form-input"
                    formControlName="password"
                  />
                  <span class="toggle-icon" (click)="hide = !hide">
                    <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
                  </span>
                </div>

                <small class="error"
                  *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.touched || submitted)">
                  Password is required
                </small>

                <div class="text-end">
                  <a class="forgot-link">Forgot Password?</a>
                </div>
              </div>
              <button
                class="login-btn mt-2"
                type="submit"
                [disabled]="loginForm.invalid"
              >
                Log In
              </button>
              <div class="help-text">
                Need help? <a href="#">Contact Support</a>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer-text">
    &copy; 2026 <span class="brand">SwiftKode</span>. All rights reserved.
  </div>
</div>
