<div class="dialog-box">
    <div class="heading-box d-flex justify-content-between align-items-center">
        <div style="gap: 4px;">
            <p class="main-title">Add New Program</p>
            <p class="main-subtitle">Create and schedule a new program</p>
        </div>

        <button class="close-btn btn-cancel" (click)="close()">
            <img src="/program/close-circle.svg" alt="">
        </button>
    </div>
    <div class="custom-line"></div>

    <form>
        <div class="form-group pt-1">
            <label class="input-label" for="program-name">Program Title *</label>
            <input class="input-field" style="width: 552px;" type="text" placeholder="Enter program name" />
        </div>

        <div class="form-group">
            <label class="input-label" for="host">Host / RJ *</label>

            <div class="select-wrapper">
                <select id="category" class="input-field" [(ngModel)]="selectedCategory" required style="width: 552px;">
                    <option disabled selected class="">Select program category</option>
                    <option>RJ Anjali</option>
                    <option>RJ Raj</option>
                </select>
                <span class="material-symbols-outlined dropdown-icon">
                    arrow_drop_down
                </span>
            </div>

        </div>

        <div class="form-group">
            <label class="input-label" for="category">Category *</label>
            <div class="select-wrapper">
                <select id="category" class="input-field" [(ngModel)]="selectedCategory" required style="width: 552px;">
                    <option disabled selected class="placeholder-txt">Select program category</option>
                    <option>Pre-Scheduled</option>
                    <option>Podcast</option>
                    <option>Live</option>
                </select>
                <span class="material-symbols-outlined dropdown-icon">
                    arrow_drop_down
                </span>
            </div>
        </div>
        <div class="form-group schedule-group" style="width: 552px;">


            <label class="input-label mb-2">Schedule</label>
            <!-- 1st row -->
            <div class="schedule-row">

                <!-- LEFT BOX -->
                <div class="schedule-box">
                    <div class="label" style="width: 139px;">Schedule Day</div>

                    <div class="divider"></div>

                    <div class="schedule-box-right">

                        <div class="select-wrapper">
                            <select class="input-field" required>
                                <option value="" disabled>Select day</option>
                                <option value="sunday" selected>Sunday</option>
                                <option value="monday">Monday</option>
                                <option value="tuesday">Tuesday</option>
                                <option value="wednesday">Wednesday</option>
                                <option value="thursday">Thursday</option>
                                <option value="friday">Friday</option>
                                <option value="saturday">Saturday</option>
                            </select>
                            <span class="material-symbols-outlined dropdown-icon">
                                arrow_drop_down
                            </span>
                        </div>
                    </div>
                </div>

                <!-- ARROW -->
                <div style="width: 87px; display: flex; justify-content: center;">
                    <span class="material-symbols-outlined arrow">
                        east
                    </span>
                </div>
                <!-- RIGHT BOX -->
                <div class="schedule-box-right">

                    <div class="select-wrapper">
                        <select class="input-field" required>
                            <option value="" disabled>Select day</option>
                            <option value="sunday">Sunday</option>
                            <option value="monday">Monday</option>
                            <option value="tuesday">Tuesday</option>
                            <option value="wednesday">Wednesday</option>
                            <option value="thursday">Thursday</option>
                            <option value="friday">Friday</option>
                            <option value="saturday" selected>Saturday</option>
                        </select>
                        <span class="material-symbols-outlined dropdown-icon">
                            arrow_drop_down
                        </span>
                    </div>
                </div>

            </div>
            <!-- 2nd row -->
            <div class="schedule-row">

                <!-- LEFT BOX -->
                <div class="schedule-box">
                    <div class="label" style="width: 139px;">Schedule Time</div>

                    <div class="divider"></div>

                    <div class="schedule-box-right">

                        <div class="select-wrapper">
                            <select class="input-field" required>
                                <option value="" disabled>Select time</option>
                                <option value="sunday" selected>2:00 PM</option>
                                <option value="sunday">3:00 PM</option>

                            </select>
                            <span class="material-symbols-outlined dropdown-icon">
                                arrow_drop_down
                            </span>
                        </div>
                    </div>
                </div>

                <!-- ARROW -->
                <div style="width: 87px; display: flex; justify-content: center;">
                    <span class="material-symbols-outlined arrow">
                        east
                    </span>
                </div>
                <!-- RIGHT BOX -->
                <div class="schedule-box-right">

                    <div class="select-wrapper">
                        <select class="input-field" required>
                            <option value="" disabled>Select time</option>
                            <option value="sunday" selected>5:00 PM</option>
                            <option value="sunday">3:00 PM</option>
                        </select>
                        <span class="material-symbols-outlined dropdown-icon">
                            arrow_drop_down
                        </span>
                    </div>
                </div>

            </div>
        </div>


        <div class="form-group">
            <label class="input-label" for="thumbnail">Thumbnail</label>

            <div class="file-upload">
                <label class="upload-btn  d-flex">
                    <input id="thumbnail" type="file" hidden />
                    <span class="material-symbols-outlined small">
                        upload
                    </span>
                    <p class="pt-3"> Upload Image
                    </p>
                </label>

                <span class="file-name">- No file uploaded -</span>
            </div>
        </div>

        <div class="form-group">
            <label class="input-label">Listener Interaction *</label>
                <mat-radio-group [(ngModel)]="selectedType" name="callOption" class="d-flex gap-3">
                    <mat-radio-button value="allow" class="radio-btn">
                        Allow calls
                    </mat-radio-button>

                    <mat-radio-button value="disable" class="radio-btn">
                        Disable Calls
                    </mat-radio-button>
                </mat-radio-group>
            
        </div>

        <!-- Buttons -->
        <div class="dialog-actions d-flex justify-content-end mt-4 mx-3 gap-2">
            <button class="close-btn btn-cancel d-flex" (click)="close()">
                <img src="/program/close-circle.svg" width="16px" alt="">
                <p>Cancel</p>
            </button>
            <button type="submit" class="btn-create d-flex">
                <img src="/dash/cloud-connection.svg" alt="">
                <span>Create new program</span>
            </button>
        </div>
    </form>
</div>
