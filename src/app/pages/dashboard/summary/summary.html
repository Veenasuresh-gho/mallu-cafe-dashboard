<div class="summary p-3">
    <div class="summary-content  ">
        <h6>Today’s Automation Summary</h6>
        <p>Real time status of program execution, file readiness and scheduled advertisements.</p>
    </div>

    <div class="d-flex gap-1  summary-cards">
        @for(item of summary; track item){
        <mat-card appearance="outlined">
            <mat-card-header class="header custom-header" [style.backgroundColor]="item.color">
                <mat-card-title>
                    <img src={{item.image}} />
                    <span>{{item.title}}</span>
                </mat-card-title>
            </mat-card-header>
            <mat-card-content>
                <div class="card-body mt-2">
                    <h4 class="stats" [innerHTML]="item.statistics"></h4>
                </div>

                @if (item.info?.trim()) {
                <div class="divider"></div>
                <div class="info d-flex align-items-center gap-2 ">
                    <img src="/main/danger.svg" alt="danger-icon">
                    <p class="mb-0" [innerHTML]="item.info"></p>
                </div>
                }
            </mat-card-content>
        </mat-card>

        }
    </div>



</div>
