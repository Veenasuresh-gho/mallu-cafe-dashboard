<div class="form-group schedule-group">

    <label class="input-label mb-2">Schedule</label>

    <!-- DAY ROW -->
    <div class="schedule-row">

        <div class="schedule-box">
            <div class="label input-field">Schedule Day</div>
            <div class="divider"></div>

            <div class="schedule-box-right">
                <div class="select-wrapper">
                    <select [(ngModel)]="fromDay" name="fromDay" required>
                        <option value="" disabled selected hidden>Sunday</option>
                        <option *ngFor="let d of days" [value]="d">{{ d }}</option>
                    </select>
                    <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
                </div>
            </div>
        </div>

        <div class="arrow-container">
            <img src="/program/arrow-right.svg" alt="">
        </div>

        <div class="schedule-box-rightEnd">
            <div class="select-wrapper">
                <select [(ngModel)]="toDay" name="toDay">
                    <option *ngFor="let d of days" [value]="d">{{ d }}</option>
                </select>
                <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
            </div>
        </div>

    </div>
