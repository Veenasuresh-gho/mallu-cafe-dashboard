<div class="dialog-box p-3">
    <div class="d-flex justify-content-between align-items-center mb-1">
        <div>
            <p class="main-title">Add New Program</p>
            <p class="main-subtitle">Create and schedule a new program</p>
        </div>
        <button (click)="close()" class="btn-close mx-2" aria-label="Close">&times;</button>
    </div>
    <hr />

    <form>
        <div class="form-group">
            <label class="input-label" for="program-name">Program Details</label>
            <input class="input-field" style="width: 552px;" type="text" placeholder="Enter program name" />
        </div>

        <div class="form-group">
            <label class="input-label" for="host">Host / RJ</label>
            <select id="host" class="input-field" style="width: 552px;">
                <option disabled selected>Select program host</option>
                <option>RJ Anjali</option>
                <option>RJ Raj</option>
            </select>
        </div>

        <div class="form-group">
            <label class="input-label" for="category">Category</label>
            <select id="category" class="input-field" style="width: 552px;">
                <option disabled selected>Select program category</option>
                <option>Pre-Scheduled</option>
                <option>Podcast</option>
                <option>Live</option>
            </select>
        </div>
        <div class="form-group schedule-group" style="width: 552px;">
  <label class="input-label">Schedule</label>

  <!-- Row 1 -->
  <div class="schedule-row">
    <div class="combined-field">
      <input class="static-label " type="text" value="Schedule Day" readonly />
      <select class="dynamic-select">
        <option disabled selected>Select Day</option>
        <option>Sunday</option>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
      </select>
    </div>

    <span class="arrow">→</span>

    <select class="single-select">
      <option disabled selected>Schedule Day</option>
       <option>Sunday</option>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
    </select>
  </div>

  <!-- Row 2 -->
  <div class="schedule-row">
    <div class="combined-field">
      <input class="static-label" type="text" value="Schedule Time" readonly />
      <select class="dynamic-select">
        <option disabled selected>Schedule Time</option>
        <option>10:00 AM</option>
        <option>11:00 AM</option>
        <option>11:30 AM</option>
      </select>
    </div>

    <span class="arrow">→</span>

    <select class="single-select">
      <option disabled selected>Schedule Time</option>
      <option>10:00 AM</option>
      <option>11:00 AM</option>
      <option>11:30 AM</option>
    </select>
  </div>
</div>

        
        <div class="form-group">
            <label class="input-label" for="thumbnail">Thumbnail</label>

            <div class="file-upload">
                <label class="upload-btn d-flex gap-1">
                    <input id="thumbnail" type="file" hidden />
                    <span class="material-symbols-outlined">
                        upload
                    </span>
                    <p class="pt-3"> Upload Image
                    </p>
                </label>

                <span class="file-name">- No file uploaded -</span>
            </div>
        </div>

        <div class="form-group listener-interaction">
            <label class="input-label my-2">Listener Interaction</label>
            <div>
                <label><input type="radio" name="interaction" value="allow" /> Allow calls</label>
                <label><input type="radio" name="interaction" value="disable" checked /> <span
                        class="disable-text">Disable Calls</span></label>
            </div>
        </div>

        <!-- Buttons -->
        <div class="dialog-actions d-flex justify-content-end mt-4 mx-3 gap-2">
            <button type="button" class="btn-cancel d-flex gap-1" (click)="close()">
                <span class="material-symbols-outlined small pt-1">
cancel
</span>
                <span> Cancel</span>
            </button>
            <button type="submit" class="btn-create d-flex">
  <img src="/dash/cloud-connection.svg" alt="">
  <span>Create new program</span>
</button>
        </div>
    </form>
</div>
