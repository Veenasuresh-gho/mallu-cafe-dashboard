<div class="dialog-box">
    <div class="d-flex justify-content-between align-items-center"
        style="padding-top: 24px; padding-left: 24px; padding-right: 24px;">
        <div>
            <p class="main-title">Upload Broadcast Media</p>
            <p class="main-subtitle">Upload audio or video content for your program and prepare it for publishing in the
                Mallu Cafe Radio App.</p>
        </div>
        <button class="close-btn btn-cancel" (click)="close()">
            <img src="/program/close-circle.svg" alt="">
        </button>
    </div>
    <div class="custom-line mt-2"></div>

    <mat-dialog-content class="dialog-content custom-select-panel">
        <app-step-badge [stepNumber]="1" title="Upload Media File"></app-step-badge>
        <div class="px-4">

            <app-upload-box [uploadText]="'Upload Broadcast Media File'"
                [subText]="'Drag & drop your file here, or click to browse'" [accept]="'audio/mp3, video/mp4'"
                [sizeText]="'MP3, MP4 • Max size: 1.5 GB'" (fileSelected)="onFileSelected($event)"></app-upload-box>
        </div>
        <p class="d-flex gap-1 pt-2 pb-3 helper-text px-4 ">
            <span class="material-symbols-outlined helper-text-icon">
                warning
            </span>
            <span class="">Supported formats: MP3, WAV, MP4
            </span>
        </p>
        <div class="custom-line-sub"></div>
        <app-step-badge [stepNumber]="2" title="Program Information" class=""></app-step-badge>


        <div class="form-row px-4">


            <app-form-category [label]="'Program Category'" [options]="programCategories"
                [(ngModel)]="selectedProgramCategory" [placeholder]="'- Select Program Category -'"
                name="programCategory"></app-form-category>



        </div>
        <div [ngSwitch]="selectedProgramCategory">

            <app-pre-scheduled *ngSwitchCase="'pre'"></app-pre-scheduled>

            <app-video-file *ngSwitchCase="'featured'"></app-video-file>

            <app-shorts *ngSwitchCase="'shorts'"></app-shorts>

            <app-podcast-file *ngSwitchCase="'podcast'"></app-podcast-file>

            <div *ngSwitchDefault>
                <app-default></app-default>
            </div>

        </div>



        <hr>
        <div class=" footer">
            <div class="dialog-actions d-flex justify-content-between my-4 mx-3 gap-2">

                <button class="close-btn btn-cancel d-flex" (click)="close()">
                    <img src="/program/close-circle.svg" width="16px" alt="">
                    <p>Cancel</p>
                </button>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn-save d-flex">
                        <img src="/upload/save-icon.svg" alt="">
                        <span>Save it as private</span>
                    </button>
                    <button type="submit" class="btn-publish d-flex">
                        <img src="/upload/public-icon.svg" alt="">
                        <span>Publish</span>
                    </button>
                    <button type="submit" class="btn-create d-flex">
                        <img src="/upload/tick-circle.svg" alt="">
                        <span>Upload File</span>
                    </button>
                </div>
            </div>
        </div>
    </mat-dialog-content>
</div>
