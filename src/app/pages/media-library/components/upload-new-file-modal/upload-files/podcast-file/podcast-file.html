<div class="d-flex align-items-center justify-content-center gap-2">
    <app-form-select label="Podcast Category Name " style="width:498px ;" [options]="catogories" optionLabel="DisplayText" optionValue="DataValue"
        placeholder="e.g., Music / Entertainment / Sports" name="host">
    </app-form-select>
    <div class="adding-btn">
        <button class="add-btn" (click)="openModalAddPodcast()">
            <img src="/upload/add.svg" alt="">
        </button>

    </div>
</div>


<!-- program name -->

<div class="form-row px-4">

    <app-form-select label="Program Name " [options]="['Om Shanti Om', 'Om Shanti Om']"
        placeholder="- Select Program Name -" name="host">
    </app-form-select>

</div>
<!-- step 3 -->

<div class="custom-line-sub" style="margin-top: 14px;"></div>

<app-step-badge [stepNumber]="3" title="Rename File"></app-step-badge>

<div class="form-row px-4 pt-3">
    <div class="form-group">
        <div class="input-prefix-wrapper">
            <span class="prefix">ProgramName//</span>
            <div class="editable-part" contenteditable="true" (input)="onTextChange($event)"
                data-placeholder="230926.mp3"></div>
        </div>
        <p class="helper-text">Use the broadcast date in DDMMYY format.</p>
    </div>
</div>
<div class="custom-line-sub"></div>

<!-- step 4 -->
<app-step-badge [stepNumber]="4" title="Thumbnail"></app-step-badge>
<div class="px-4 py-1">

    <div class="radio-grp py-2 px-1">
        <!-- Use Program Thumbnail -->
        <div class="custom-radio" [class.selected]="selectedType === 'program'" (click)="selectedType = 'program'">
            <div class="circle"></div>
            <span>Use Program Thumbnail</span>
        </div>

        <!-- Upload Custom Thumbnail -->
        <div class="custom-radio" [class.selected]="selectedType === 'custom'" (click)="selectedType = 'custom'">
            <div class="circle"></div>
            <span>Upload Custom Thumbnail</span>
        </div>
    </div>

    <div [hidden]="selectedType !== 'program'" class="mt-3">
        <div>
            <img src="/upload/file-img.png" width="100%" class="upload-img">
        </div>
    </div>

    <div [hidden]="selectedType !== 'custom'" class="">
        <div class="form-group">
            <label class="input-label" for="thumbnail">Thumbnail</label>

        <div class="file-upload">
  <!-- Upload button -->
  <label class="upload-btn d-flex align-items-center gap-2">
      <input id="thumbnail" type="file" hidden />
      <img src="/program/upload-icon.svg" alt="">
      <p class="m-0">Upload Image</p>
  </label>

  <!-- File info -->
  <div class="upload-content d-flex justify-content-between align-items-center">
      <span class="file-name px-2">IMG13428.JPEG</span>
<div class="division">
</div>
      <div class="upload-actions d-flex align-items-center gap-2">
          <img src="/upload/eye.svg" alt="">
          <p class="m-0">View image</p>
      </div>
  </div>
</div>
        </div>
    </div>

</div>


<!-- step 5 -->
<div>

    <div class="custom-line-sub mt-2"></div>


    <app-step-badge [stepNumber]="5" title="Public App Content"></app-step-badge>

    <div class="form-row px-4">
        <div class="form-group">

            <!-- <app-form-input label="Subtitle *" customClass="large-input"
                placeholder="e.g. RJ Neena chats about the actor’s latest movie, career journey, and upcoming projects"
                name="programTitle">
            </app-form-input> -->
            <div class="form-row">
                <label class="input-label">Subtitle *</label>

            </div>
            <textarea class="input-field textarea-field "
                placeholder="e.g. RJ Neena chats about the actor’s latest movie, career journey, and upcoming projects"
                [(ngModel)]="subtitle" rows="2" name="programTitle"></textarea>
            <p class="helper-text ">Keep it short and engaging for listeners.</p>

        </div>

    </div>

</div>
