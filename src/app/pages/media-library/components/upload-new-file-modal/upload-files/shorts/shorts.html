        <div class="custom-line-sub" style="margin-top: 14px;"></div>

        <app-step-badge [stepNumber]="3" title="Rename File"></app-step-badge>

        <div class="form-row px-4 pt-3">
            <div class="form-group">
                <div class="input-prefix-wrapper input-field">
                    <span class="prefix">shorts//</span>
                    <div class="editable-part" contenteditable="true" (input)="onTextChange($event)"
                        data-placeholder="230926.mp3"></div>
                </div>
                <p class="helper-text">Use the broadcast date in DDMMYY format.</p>
            </div>
        </div>
                    <div class="custom-line-sub "></div>

                <!-- step 4 -->
        <app-step-badge [stepNumber]="4" title="Thumbnail"></app-step-badge>

        <div class="d-flex gap-3 px-3 my-2">
            <mat-radio-group [(ngModel)]="selectedType" class="d-flex gap-3 ">

                <mat-radio-button value="program" class="radio-btn input-label">
                    Use Program Thumbnail
                </mat-radio-button>

                <mat-radio-button value="custom" class="radio-btn input-label">
                    Upload Custom Thumbnail
                </mat-radio-button>

            </mat-radio-group>
        </div>
        <!-- contents -->
         <div *ngIf="selectedType === 'program'" class=" mt-3 px-4">
            <div *ngIf="selectedProgramCategory === 'pre' ">
                <img src="/upload/file-img.png" width="100%" class="upload-img">
            </div>
        </div>
           <div *ngIf="selectedType === 'custom'" class=" px-4">
            <div class="form-group">
                <label class="input-label" for="thumbnail">Custom Thumbnail</label>

                <div class="file-upload">
                    <label class="upload-btn d-flex gap-2">
                        <input id="thumbnail" type="file" hidden />
                        <img src="/program/upload-icon.svg" alt="">

                        <p class="pt-3"> Upload Image
                        </p>
                    </label>

                    <span class="file-name px-2 input-label-noFile">- No file uploaded -</span>
                </div>
                <p class="helper-text">JPG, JPEG, PNG formats. Required for podcast, featured videos, shorts.</p>
            </div>
      
        </div>
         <!-- step 5 -->

        <div
           >

            <div class="custom-line-sub "></div>


            <app-step-badge [stepNumber]="5" title="Public App Content"></app-step-badge>


            <div class="form-row px-4 my-2"
              >
                <div class="form-group">

                    <input class="input-field py-1 px-2" type="text"
                        placeholder="eg. Celebrity Talk – Exclusive Interview with Actor Nivin Pauly" />
                     -->
                        <app-form-input label="Title *" placeholder="eg. Celebrity Talk – Exclusive Interview with Actor Nivin Pauly" name="Title"></app-form-input>

                        <p class="helper-text mt-1">Keep it short and engaging for listeners.</p>

                    </div>
            </div>
