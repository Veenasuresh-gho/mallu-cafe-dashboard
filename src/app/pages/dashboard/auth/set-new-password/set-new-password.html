<div class="bg-container d-flex justify-content-center align-items-center">
  <div class="login-card d-flex flex-column align-items-center">

    <!-- RED HEADER STRIP -->
    <div class="card-header-strip"></div>

    <!-- ICON -->
    <div class="d-flex justify-content-center pt-4 mb-3">
      <img src="/auth/verify.svg" alt="verify icon" class="verify-icon">
    </div>

    <!-- TITLE -->
    <div class="text-center mb-4">
      <p class="welcome-head">Set a new password</p>
      <p class="welcome-text">Create a new password to access your account.</p>
    </div>

    <!-- FORM -->
    <form [formGroup]="passwordForm" (ngSubmit)="resetPassword()" class="form-container" novalidate>

      <!-- New Password -->
      <div class="form-group">
        <label>New Password</label>

        <mat-form-field appearance="outline" class="full-width custom-mat-field">

          <input matInput [type]="hidePassword ? 'password' : 'text'" placeholder="Enter your new password"
            formControlName="password" />

          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>

          @if (passwordForm.get('password')?.hasError('required')) {
          <mat-error>Password is required</mat-error>
          }
        </mat-form-field>
      </div>


      <!-- Confirm Password -->
      <div class="form-group">
        <label>Confirm Password</label>

        <mat-form-field appearance="outline" class="full-width custom-mat-field">

          <input matInput [type]="hideConfirm ? 'password' : 'text'" placeholder="Re-enter your new password"
            formControlName="confirmPassword" />

          <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm">
            <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>

        </mat-form-field>

        <!-- ✅ Description FIRST -->
        <small class="description">
          Use at least 8 characters with a mix of letters and numbers
        </small>

        <!-- ✅ Error BELOW -->
        <!-- @if (passwordForm.get('confirmPassword')?.hasError('required')) {
  <div class="error">Confirm password is required</div>
} -->
      </div>

      <!-- Reset Button -->
      <button class="login-btn mt-4" type="submit" [disabled]="passwordForm.invalid">
        Reset Password
      </button>

      <!-- Back to Login -->
      <div class="back-button d-flex justify-content-center py-3 mt-2">
        <a href="/sign-in">Back to Login</a>
      </div>
    </form>

  </div>

</div>
