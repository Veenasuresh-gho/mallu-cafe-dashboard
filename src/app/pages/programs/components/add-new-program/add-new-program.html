<div class="dialog-box">

    <app-dialog-header-component [title]="'Add New Program'" [subtitle]="'Create and schedule a new program'"
        (closeClicked)="close()"></app-dialog-header-component>

    <form>

        <app-form-input label="Program Title *" placeholder="Enter program name" name="programTitle"></app-form-input>


        <app-form-select label="Host / RJ " [options]="['RJ Anjali', 'RJ Raj']" placeholder="Select host / RJ"
            name="host"></app-form-select>


        <app-form-select label="Category" [options]="['Pre-Scheduled', 'Podcast', 'Live']" placeholder="Select category"
            name="category"></app-form-select>

        <app-schedule-picker></app-schedule-picker>

        <div class="form-group">
            <label class="input-label" for="thumbnail">Thumbnail</label>

            <div class="file-upload">
                <label class="upload-btn  d-flex">
                    <input id="thumbnail" type="file" hidden />
                    <span class="material-symbols-outlined small">
                        upload
                    </span>
                    <p class="pt-3"> Upload Image
                    </p>
                </label>

                <span class="file-name">- No file uploaded -</span>
            </div>
        </div>

        <div class="form-group">
            <label class="input-label">Listener Interaction *</label>
            <mat-radio-group [(ngModel)]="selectedType" name="callOption" class="d-flex gap-3 radio-btn-grp">
                <mat-radio-button value="allow" class="radio-btn">
                    Allow calls
                </mat-radio-button>

                <mat-radio-button value="disable" class="radio-btn">
                    Disable Calls
                </mat-radio-button>
            </mat-radio-group>
        </div>

        <!-- Buttons -->
    </form>
</div>
<div class="border footer pb-3">
    <div class="dialog-actions d-flex justify-content-end mt-4 mx-4 ">
        <app-cancel-button class="pt-2"></app-cancel-button>
        <app-footer-button text="Create new program" icon="/dash/cloud-connection.svg" type="button">
        </app-footer-button>
    </div>
</div>
