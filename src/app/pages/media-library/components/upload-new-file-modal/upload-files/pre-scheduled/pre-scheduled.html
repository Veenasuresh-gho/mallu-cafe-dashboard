<div class="form-row px-4">

    <app-form-select label="Program Name " [options]="['Om Shanti Om', 'Om Shanti Om']"
        placeholder="- Select Program Name -" name="host">
    </app-form-select>
</div>

<div class="custom-line-sub" style="margin-top: 14px;"></div>

<app-step-badge [stepNumber]="3" title="Rename File"></app-step-badge>

<div class="form-row px-4 pt-3">
    <div class="form-group">
        <div class="input-prefix-wrapper">
            <span class="prefix">m Shanti Om//</span>
            <div class="editable-part" contenteditable="true" (input)="onTextChange($event)"
                data-placeholder="160326.mp3"></div>
        </div>
        <p class="helper-text">Use the broadcast date in DDMMYY format.</p>
    </div>
</div>
<div class="custom-line-sub" ></div>

<!-- step 4 -->
<app-step-badge [stepNumber]="4" title="Thumbnail"></app-step-badge>

<div class="d-flex gap-3 px-3 my-2">
   <div class="radio-grp py-2 px-2">
    <!-- Use Program Thumbnail -->
    <div class="custom-radio" [class.selected]="selectedType === 'program'" 
         (click)="selectedType = 'program'">
        <div class="circle"></div>
        <span>Use Program Thumbnail</span>
    </div>

    <!-- Upload Custom Thumbnail -->
    <div class="custom-radio" [class.selected]="selectedType === 'custom'" 
         (click)="selectedType = 'custom'">
        <div class="circle"></div>
        <span>Upload Custom Thumbnail</span>
    </div>
</div>
</div>
<div [hidden]="selectedType !== 'program'" class="mt-3 px-4">
  <div>
    <img src="/upload/file-img.png" width="100%" class="upload-img">
  </div>
</div>   


<div [hidden]="selectedType !== 'custom'" class="px-4">

    <div class="form-group">
        <label class="input-label" for="thumbnail">Custom Thumbnail</label>

        <div class="file-upload">
            <label class="upload-btn d-flex gap-2">
                <input id="thumbnail" type="file" hidden />
                <img src="/program/upload-icon.svg" alt="">

                <p class="pt-3"> Upload Image
                </p>
            </label>

            <span class="file-name px-2 input-label-noFile">- No file uploaded -</span>
        </div>
        <p class="helper-text">JPG, JPEG, PNG formats. Required for podcast, featured videos, shorts.</p>
    </div>
    <div class="form-group" *ngIf="fileSelectedName">
        <label class="input-label" for="thumbnail">Thumbnail</label>

        <div class="file-upload">
            <label class="upload-btn d-flex gap-1">
                <input id="thumbnail" type="file" hidden />
                <img src="/program/upload-icon.svg" alt="">

                <p class="pt-3"> Upload Image
                </p>
            </label>
            <div class="d-flex justify-content-between upload-content">
                <span class="file-name px-2"> IMG13428.JPEG </span>
                <div class="file-name d-flex justify-content-end">
                    👁 View image
                </div>
            </div>
        </div>
    </div>
</div>
