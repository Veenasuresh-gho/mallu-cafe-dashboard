<div class="form-group">
  <label class="input-label">{{ label }} *</label>

  <div class="select-wrapper">

    <!-- Selected Display -->
    <div
      class="input-field"
      tabindex="0"
      (click)="toggleDropdown()"
      [ngClass]="{
        'selected-border': selectedValue,
        'selected-text': selectedValue,
        'placeholder-text': !selectedValue
      }"
    >
      {{ getDisplayLabel() }}
    </div>

    <!-- Dropdown -->
    <div class="dropdown" *ngIf="open">
      <div
        class="option"
        *ngFor="let item of options"
        (click)="setValue(item)"
      >
        {{ item[optionLabel] }}
      </div>
    </div>

    <!-- Icon -->
    <img src="/program/dropdown.svg" class="dropdown-icon" />
  </div>
</div>
