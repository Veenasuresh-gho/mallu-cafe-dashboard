<div class="row">

  <!-- LEFT SIDE -->
  <div class="col-md-3">
    <div class="d-flex flex-column">
      <p class="mainHead mb-1">Profile Info</p>
      <small class="subHeading">
        Personal and contact details.
      </small>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="col-md-9">
    <div class="row">

      <!-- Column 1 -->
      <div class="col-md-4">
        <div class="mb-3">
          <label class="form-label input-label">Full Name</label>
          <input 
            type="text"
            class="form-control input-txt"
            [value]="profile?.FullName || ''"
            readonly
          />
        </div>

        <div>
          <label class="form-label input-label">Phone Number</label>
          <div class="input-group">
            <span class="input-group-text input-label">
              +{{ profile?.CountryCode || '' }}
            </span>
            <input 
              type="text"
              class="form-control input-txt"
              [value]="profile?.Phone || ''"
              readonly
            />
          </div>
        </div>
      </div>

      <!-- Column 2 -->
      <div class="col-md-4">
        <div class="mb-3">
          <label class="form-label input-label">Designation / Role</label>
          <input 
            type="text"
            class="form-control input-txt"
            [value]="profile?.Role || ''"
            readonly
          />
        </div>

        <div>
          <label class="form-label input-label">Email</label>
          <input 
            type="email"
            class="form-control input-txt"
            [value]="profile?.Email || ''"
            readonly
          />
        </div>
      </div>

    </div>
  </div>

</div>

<mat-divider class="text-[#E4E4E4] my-4"></mat-divider>
