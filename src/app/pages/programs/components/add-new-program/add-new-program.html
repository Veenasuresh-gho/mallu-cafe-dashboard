 [title]="'Add New Program'"

            <label class="input-label" for="category">Category *</label>
            <div class="select-wrapper">

        <app-form-select
    label="Category *"
    [options]="['Pre-Scheduled', 'Podcast', 'Live']"
    name="category"
  ></app-form-select>

<app-schedule-picker></app-schedule-picker>

        <div class="form-group">
            <label class="input-label" for="thumbnail">Thumbnail</label>

            <div class="file-upload">
                <label class="upload-btn  d-flex">
                    <input id="thumbnail" type="file" hidden />
                    <span class="material-symbols-outlined small">
                        upload
                    </span>
                    <p class="pt-3"> Upload Image
                    </p>
                </label>

                <span class="file-name">- No file uploaded -</span>
            </div>
        </div>

        <div class="form-group">
            <label class="input-label">Listener Interaction *</label>
                <mat-radio-group [(ngModel)]="selectedType" name="callOption" class="d-flex gap-3">
                    <mat-radio-button value="allow" class="radio-btn">
                        Allow calls
                    </mat-radio-button>

                    <mat-radio-button value="disable" class="radio-btn">
                        Disable Calls
                    </mat-radio-button>
                </mat-radio-group>
            
        </div>

        <!-- Buttons -->
        <div class="dialog-actions d-flex justify-content-end mt-4 mx-3 gap-2">
            <button class="close-btn btn-cancel d-flex" (click)="close()">
                <img src="/program/close-circle.svg" width="16px" alt="">
                <p>Cancel</p>
            </button>
            <button type="submit" class="btn-create d-flex">
                <img src="/dash/cloud-connection.svg" alt="">
                <span>Create new program</span>
            </button>
        </div>
    </form>
</div>
