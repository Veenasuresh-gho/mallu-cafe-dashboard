
<div class="team-members ">
    <div class="p-3">
        <div class="header d-flex justify-content-between align-items-center ">
            <div>
                <h4 class="mb-0">Team members</h4>
                <p>Manage radio hosts and staff involved in programs and live shows.</p>
            </div>

            <button class="d-flex align-items-center gap-1" (click)="openModal()">
                <img src="/main/add.svg">
                Add new member
            </button>
        </div>

        <div class="divider"></div>

        <div class="d-flex justify-content-between align-items-center">
            <div class="filter-container">
                <mat-form-field appearance="outline" class="search-field">
                    <span matPrefix class="search-icon">
                        <img src="/main/searchIcon.svg" alt="search" />
                    </span>
                    <input matInput placeholder="Search here..." [(ngModel)]="searchText" />
                </mat-form-field>

                <!-- Dropdowns -->
                <mat-form-field appearance="outline">
                    <mat-select placeholder="Roles" [(value)]="roles">
                        <mat-option value="all">All roles</mat-option>
                        <mat-option value="all">RJ</mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-select placeholder="All Programs" [(value)]="programs">
                        <mat-option value="all">All Programs</mat-option>

                    </mat-select>
                </mat-form-field>


            </div>
            <div class="d-flex align-items-center gap-1">
                <p style="font-size: 12px; font-weight: 500; color: #757575;">Clear filters</p>
                <mat-icon style="font-size: 12px; color: #757575; cursor: pointer;" class="mb-1">cancel</mat-icon>
            </div>
        </div>

    </div>

    <table mat-table [dataSource]="dataSource" class="custom-table">

        <ng-container matColumnDef="team-members">
            <th mat-header-cell *matHeaderCellDef>Profile</th>
            <td mat-cell *matCellDef="let row">
                <div class="program-cell">
                    <img [src]="row.avatar" class="avatar" />
                    <div class="program-name">{{ row.name }}</div>
                </div>
            </td>
        </ng-container>


        <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Role</th>
            <td mat-cell *matCellDef="let row">
                <div class="user">{{ row.role }}</div>
            </td>
        </ng-container>

        <ng-container matColumnDef="assignedPrograms">
            <th mat-header-cell *matHeaderCellDef>Assigned Programs</th>
            <td mat-cell *matCellDef="let row">
                {{ row.assignedPrograms }}
            </td>
        </ng-container>

        <ng-container matColumnDef="mobile">
            <th mat-header-cell *matHeaderCellDef>Mobile</th>
            <td mat-cell *matCellDef="let row">
                {{ row.mobile }}
            </td>
        </ng-container>

        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let row">
                {{ row.email }}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>

    </table>

    <mat-paginator [length]="22" [pageSize]="7" [pageSizeOptions]="[7]" showFirstLastButtons>
    </mat-paginator>

</div>
