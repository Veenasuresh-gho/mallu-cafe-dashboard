<div class="row gap-2">
  <div class="col-md-3 justify-content-start">
    <h6 class="fw-bold mb-1">Profile Info</h6>
    <small class="text-muted">
      Personal and contact details.
    </small>
  </div>
  <div class="col-md-3">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" placeholder="Shijo M sebastian" />
    </div>

    <div>
      <label class="form-label">Phone Number</label>
      <div class="input-group">
        <span class="input-group-text">+1</span>
        <input type="text" class="form-control" placeholder="202 555 0143" />
      </div>
    </div>

  </div>

  <div class="col-md-3">

    <div class="mb-3 ">
      <label class="form-label ">Designation / Role</label>
      <input type="text" class="form-control" placeholder="Radio Jockey" />
    </div>

    <div>
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="rj.shijosebastian345@gmail.com" />
    </div>

  </div>

  <div class="col-md-2 d-flex align-items-end">
    <button class="btn border border-danger w-100 d-flex align-items-center justify-content-center gap-2"
      style="background-color: #D809051A;">
      <span class="material-symbols-outlined text-white bg-danger rounded-circle small">
        check
      </span>
      Save changes
    </button>
  </div>

</div>
<mat-divider class="custom-divider my-4"></mat-divider>
