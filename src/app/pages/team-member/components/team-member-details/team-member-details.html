<div class="heading-path">
    <div class="d-flex gap-1">
        <img src="/team/arrow-left.svg" alt="back_arrow">
        <div class="back-btn">Back</div>
    </div>
    <div>
        <span class="path-name">Team Members > Shijo M Sebastian  </span>
    </div>
</div>
<div class="team-members">
    <div class="row align-items-start">
        <div class="col-md-3">
            <div class="d-flex flex-column align-items-start">
                <p class="mainHead mb-1">Profile Photo</p>
                <small class="subHeading">
                    Upload or update your profile picture.
                </small>
            </div>
        </div>
         <div class="col-md-9">
            <div class="d-flex align-items-center gap-3 flex-wrap">

                <div>
                    <img src="/profile/profile-pic.png" alt="profile" class="rounded" width="80" height="80"
                        style="object-fit: cover;" />
                </div>

                <div class="d-flex gap-2 align-items-end pt-4">

                    <label class="btn btn-outline-secondary upload-btn mb-0 d-flex align-items-center gap-2">
                        <span class="material-symbols-outlined">upload</span>
                        Upload new image
                        <input type="file" class="d-none">
                    </label>

                    <button class="btn btn-create delete-btn border d-flex align-items-center gap-2">
                                                <span class="material-symbols-outlined text-muted">delete</span>

                        Delete
                    </button>
            

                </div>

            </div>
        </div>
    </div>
    <!-- step-2 -->
     <mat-divider class="text-muted my-4"></mat-divider>
    <div>
        <app-profile-info></app-profile-info>
    </div>
    <div>
        <app-assigned-prgm></app-assigned-prgm>
    </div>
    <div>
        <app-perfomance></app-perfomance>
    </div>
    <div>
        <app-media-contribution></app-media-contribution>
    </div>
    <div>
        <app-permission></app-permission>
    </div>
   
</div>
<div class="main-body my-3 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">

  <!-- LEFT TEXT -->
  <div>
    <p class="mainHead mb-1">Manage Member</p>
    <p class="subHeading mb-0">
      Make changes to profile details, program assignments, or remove this member.
    </p>
  </div>

  <!-- RIGHT BUTTONS -->
  <div class="d-flex flex-column flex-sm-row gap-2 ">
    
    <button 
      class="btn-manage-member d-flex gap-1 align-items-center justify-content-center"
      (click)="openModal()">
      <span class="material-symbols-outlined icon">border_color</span>
      Manage Member
    </button>

   
    <app-footer-button style="width: 129px;" (click)="openModalDeleteMember()" text="Delete Member" icon="/profile/trash.svg"
            type="button">
        </app-footer-button>

  </div>
</div>
