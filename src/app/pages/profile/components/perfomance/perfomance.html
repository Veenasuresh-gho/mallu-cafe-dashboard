<div class="row">
  <div class="col-md-3 ">
    <div class="d-flex flex-column justify-content-start">
      <p class="mainHead mb-1 ">Performance Overview</p>
      <small class="subHeading">
        Insights from your shows and listener interactions.
      </small>
    </div>
  </div>
  <div class="col-md-8 mx-2">
    <ul class="list-unstyled d-flex gap-3 mb-0 mt-2 flex-wrap">

      @for (item of stats; track item.label) {
      <li class="d-flex align-items-center gap-1">

        <img [src]="item.icon" class="icon-img" width="16" height="16" />

        <div class="d-flex">
          <span class="PerformanceData">{{ item.label }}:</span>
          <span class="countData">{{ item.count }}</span>
        </div>

        @if (item.trendIcon) {
        <img [src]="item.trendIcon" class="icon-img" width="16" height="16" />
        }

      </li>
      }

    </ul>
  </div>

</div>
<mat-divider class="text-secondary bg-muted my-4"></mat-divider>
