<div class="main-body ">
    <div class="d-flex  gap-4 rounded">
        <div class="d-flex flex-column justify-content-start">
            <h6 class="fw-bold mb-1">Profile Photo</h6>
            <small class="text-muted">
                Upload or update your profile picture.
            </small>
        </div>
        <div class="d-flex align-items-center gap-3 mx-3">

            <div>
                <img src="/profile/profile-pic.png" alt="profile" class="rounded" width="80" height="80"
                    style="object-fit: cover;" />
            </div>

            <div class="d-flex gap-2 justify-content-end align-items-end mb-0">

                <label class="btn btn-outline-secondary mb-0 d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined">upload</span>
                    Upload new image
                    <input type="file" class="d-none">
                </label>

                <button class="btn btn-light border d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined text-muted">delete</span>
                    Delete
                </button>

            </div>

        </div>

    </div>
    <mat-divider class="text-muted my-4"></mat-divider>
    <div>
        <app-profile-info></app-profile-info>
    </div>
    <div>
        <app-assigned-prgm></app-assigned-prgm>
    </div>
    <div>
        <app-perfomance></app-perfomance>
    </div>
    <div>
        <app-media-contribution></app-media-contribution>
    </div>
    <div>
        <app-permission></app-permission>
    </div>
    <div>
        <app-settings></app-settings>
    </div>
</div>
