<div class="form-group schedule-group">

  <!-- HEADER -->
  <div class="schedule-header">
    <label class="input-label" *ngIf="showScheduleDay">Schedule *</label>


  </div>

  <!-- DAY ROW -->
  <div class="schedule-row" *ngIf="showScheduleDay">

    <div class="schedule-box">
      <div class="label input-field">Schedule Day</div>
      <div class="divider"></div>

      <div class="schedule-box-right">
        <div class="select-wrapper">
          <select [(ngModel)]="fromDay" (ngModelChange)="emitChange()" name="fromDay" required
            [ngClass]="{'selected': fromDay}">
            <option value="" disabled selected hidden>Sunday</option>
            <option *ngFor="let d of days" [value]="d.value">
              {{ d.label }}
            </option>
          </select>
          <img src="/program/dropdown.svg" class="dropdown-icon" alt="">
        </div>
      </div>
    </div>

    <div class="arrow-container">
      <img src="/program/arrow-right.svg" alt="">
    </div>

    <div class="schedule-box-rightEnd ">
      <div class="select-wrapper">
        <select [(ngModel)]="toDay" (ngModelChange)="emitChange()" name="toDay" [ngClass]="{'selected': toDay}">
          <option value="" disabled selected hidden>Saturday</option>
          <option *ngFor="let d of days" [value]="d.value">
            {{ d.label }}
          </option>
        </select>
        <img src="/program/dropdown.svg" class="dropdown-icon" alt="">
      </div>
    </div>

  </div>

  
  <div class="schedule-row mt-2">

    <div class="schedule-box">
      <div class="label input-field">Schedule Time</div>
      <div class="divider"></div>

      <div class="schedule-box-right">
        <div class="select-wrapper">
          <select [(ngModel)]="fromTime" (ngModelChange)="emitChange()" name="fromTime"
            [ngClass]="{'selected': fromTime}">

            <option value="" disabled hidden>Select Time</option>

            <option *ngFor="let t of times" [value]="t">
              {{ t }}
            </option>
          </select>
          <img src="/program/dropdown.svg" class="dropdown-icon" alt="">
        </div>
      </div>
    </div>

    <div class="arrow-container">
      <img src="/program/arrow-right.svg" alt="">
    </div>

    <div class="schedule-box-rightEnd">
      <div class="select-wrapper">
        <select [(ngModel)]="toTime" (ngModelChange)="emitChange()" name="toTime" [ngClass]="{'selected': toTime}">

          <option value="" disabled hidden>Select Time</option>

          <option *ngFor="let t of times" [value]="t">
            {{ t }}
          </option>
        </select>
        <img src="/program/dropdown.svg" class="dropdown-icon" alt="">
      </div>
    </div>

  </div>

</div>

<div class="calendar-overlay" *ngIf="isCalendarOpen" (click)="closeCalendar()">

  <div class="calendar-popup" (click)="$event.stopPropagation()">
    <app-custom-calendar
      (dateChange)="onDateSelected($event)">
    </app-custom-calendar>
  </div>

</div>
